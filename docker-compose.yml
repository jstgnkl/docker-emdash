name: emdash

services:
  emdash:
    image: jstgnkl/emdash:0.2.0
    container_name: emdash
    ports:
      - "4321:4321"
    volumes:
      # Persist SQLite database and uploaded media across restarts
      - emdash-data:/app/data
      - emdash-uploads:/app/uploads
    restart: unless-stopped

volumes:
  emdash-data:
  emdash-uploads:

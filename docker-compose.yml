name: emdash

services:
  emdash:
    image: jstgnkl/emdash:latest
    container_name: emdash
    environment:
      # Set to your public HTTPS origin when behind a reverse proxy
      - EMDASH_SITE_URL=${EMDASH_SITE_URL:-}
    ports:
      - "4321:4321"
    volumes:
      # Persist SQLite database and uploaded media across restarts
      - emdash-data:/app/data
      - emdash-uploads:/app/uploads
    restart: unless-stopped

volumes:
  emdash-data:
  emdash-uploads:
